<!DOCTYPE html>
<html>
<head>
  <title>History of Pashtuns</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      overflow: hidden;
    }

    /* 🌄 BACKGROUND SCENE */
    .scene {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: linear-gradient(to top, #0f172a, #1e293b, #334155);
      overflow: hidden;
    }

    /* 🏔 mountains */
    .mountain {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(to top, #0b1220, #1e293b);
      clip-path: polygon(0 100%, 10% 60%, 25% 80%, 40% 50%, 60% 75%, 75% 55%, 100% 80%, 100% 100%);
    }

    /* 🌫 fog animation */
    .fog {
      position: absolute;
      width: 200%;
      height: 100%;
      background: rgba(255,255,255,0.05);
      filter: blur(30px);
      animation: moveFog 10s linear infinite;
    }

    @keyframes moveFog {
      from { transform: translateX(-50%); }
      to { transform: translateX(0%); }
    }

    /* 🎬 INTRO SCREEN */
    .intro {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: rgba(0,0,0,0.6);
      z-index: 10;
    }

    .intro h1 {
      font-size: 28px;
      animation: fadeIn 2s ease;
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }

    /* LOGIN */
    .login {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 20;
    }

    .box {
      background: rgba(15,23,42,0.9);
      padding: 25px;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    /* APP */
    .app {
      display: none;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      height: 100vh;
      background: #0b1220;
      position: fixed;
      padding: 15px;
    }

    .chapter {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border-radius: 6px;
      cursor: pointer;
    }

    .content {
      margin-left: 270px;
      padding: 20px;
      animation: fadeIn 0.5s ease;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<!-- 🌄 SCENE -->
<div class="scene">
  <div class="fog"></div>
  <div class="mountain"></div>
</div>

<!-- 🎬 INTRO -->
<div class="intro" id="intro">
  <h1>📜 Entering the History of Pashtuns...</h1>
</div>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="box">
    <h2>📜 Log into the History of Pashtuns</h2>
    <input id="email" placeholder="Enter Email">
    <input id="password" type="password" placeholder="Enter Password">
    <button onclick="start()">Enter History</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="sidebar">
    <h3>📚 Pashtun History</h3>

    <div class="chapter" onclick="openChapter('intro')">📖 Introduction</div>
    <div class="chapter" onclick="openChapter('history')">📜 History</div>
    <div class="chapter" onclick="openChapter('empire')">🏛 Empire</div>
    <div class="chapter" onclick="openChapter('traditions')">🌍 Traditions</div>
  </div>

  <div class="content" id="contentBox">
    <div class="card">Welcome to the History of Pashtuns</div>
  </div>

</div>

<script>

function start() {
  document.getElementById("intro").innerHTML = "<h1>🌫 Loading History...</h1>";

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("loginPage").style.display = "flex";
  }, 2000);
}

function openChapter(ch) {
  let text = "";

  if (ch === "intro") {
    text = "<div class='card'>📖 Pashtuns are one of the oldest ethnic groups in South Asia.</div>";
  }

  if (ch === "history") {
    text = "<div class='card'>📜 Ancient Indo-Iranian tribes, resistance to empires, strong tribal identity.</div>";
  }

  if (ch === "empire") {
    text = "<div class='card'>🏛 Durrani Empire (1747) founded by Ahmad Shah Durrani.</div>";
  }

  if (ch === "traditions") {
    text = "<div class='card'>🌍 Pashtunwali: honor, hospitality, justice, jirga system.</div>";
  }

  document.getElementById("contentBox").innerHTML = text;
}

</script>

</body>
</html>
