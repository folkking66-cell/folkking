<!DOCTYPE html>
<html>
<head>
  <title>Pushtoon Auth System</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial;
      background:#f2f2f2;
    }

    .container{
      background:white;
      padding:30px;
      border-radius:20px;
      width:340px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.2);
    }

    input{
      width:90%;
      padding:12px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button{
      width:95%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:orange;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-top:5px;
    }

    .switch{
      margin-top:10px;
      color:blue;
      cursor:pointer;
      font-size:14px;
    }

    h2{
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2 id="title">LOGIN</h2>

  <input type="email" id="email" placeholder="Enter Gmail">
  <input type="password" id="password" placeholder="Password">

  <button onclick="mainAction()">LOGIN</button>

  <div class="switch" onclick="toggleMode()">
    Don't have an account? Signup
  </div>

</div>

<script>

let mode = "login"; // login or signup

function toggleMode(){
    const title = document.getElementById("title");
    const btn = document.querySelector("button");
    const switchText = document.querySelector(".switch");

    if(mode === "login"){
        mode = "signup";
        title.innerText = "SIGNUP";
        btn.innerText = "SIGN UP";
        switchText.innerText = "Already have an account? Login";
    } else {
        mode = "login";
        title.innerText = "LOGIN";
        btn.innerText = "LOGIN";
        switchText.innerText = "Don't have an account? Signup";
    }
}

function mainAction(){

    let email = document.getElementById("email").value.trim().toLowerCase();
    let password = document.getElementById("password").value.trim();

    if(email === "" || password === ""){
        alert("Please fill all fields!");
        return;
    }

    if(!email.endsWith("@gmail.com")){
        alert("Only Gmail accounts allowed!");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    // ---------------- SIGNUP ----------------
    if(mode === "signup"){

        let exists = users.find(u => u.email === email);

        if(exists){
            alert("User already exists!");
            return;
        }

        users.push({
            email: email,
            password: password
        });

        localStorage.setItem("users", JSON.stringify(users));

        alert("Signup successful! Now login.");
        toggleMode();
    }

    // ---------------- LOGIN ----------------
    else if(mode === "login"){

        let user = users.find(u => u.email === email && u.password === password);

        if(!user){
            alert("Invalid email or password!");
            return;
        }

        alert("Login successful!");
    }
}

</script>

</body>
</html>
