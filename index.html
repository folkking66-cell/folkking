<!DOCTYPE html>
<html>
<head>
  <title>Pashtun History Web App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    /* LOGIN */
    .login {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
    }

    .box {
      background: #111827;
      padding: 25px;
      width: 340px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    /* MAP SCREEN */
    .mapScreen {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .mapBox {
      width: 320px;
      height: 200px;
      background: linear-gradient(135deg, #1e3a8a, #0f172a);
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      color: #93c5fd;
    }

    /* APP */
    .app {
      display: none;
    }

    /* NAV */
    .nav {
      background: #0f172a;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #1e293b;
    }

    .nav button {
      background: transparent;
      border: none;
      color: white;
      margin: 0 8px;
      cursor: pointer;
    }

    .nav button:hover {
      color: #60a5fa;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 10px;
      margin-top: 15px;
      line-height: 1.7;
    }

    h2 {
      margin-top: 0;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="box">
    <h2>📜 Pashtun History Portal</h2>

    <input id="email" placeholder="Enter Gmail">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>
</div>

<!-- MAP -->
<div id="mapPage" class="mapScreen">
  <h2>📍 Enter Your Location</h2>

  <input id="location" placeholder="City / Region">
  <button onclick="openApp()">Continue</button>

  <div class="mapBox" id="mapBox">
    Map Preview Area
  </div>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="nav">
    <div>📜 Pashtun History</div>

    <div>
      <button onclick="show('home')">Home</button>
      <button onclick="show('history')">History</button>
      <button onclick="show('traditions')">Traditions</button>
      <button onclick="show('culture')">Culture</button>
    </div>
  </div>

  <div class="container" id="content"></div>

</div>

<script>

let userEmail = "";

/* LOGIN CHECK */
function login() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  if (!email.includes("@gmail.com")) {
    alert("Email must be Gmail (@gmail.com)");
    return;
  }

  if (!email || !pass) {
    alert("Fill all fields");
    return;
  }

  userEmail = email;

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("mapPage").style.display = "flex";
}

/* MAP -> APP */
function openApp() {
  let loc = document.getElementById("location").value;

  document.getElementById("mapBox").innerText = "📍 " + loc;

  document.getElementById("mapPage").style.display = "none";
  document.getElementById("app").style.display = "block";

  show("home");
}

/* NAV CONTENT */
function show(page) {

  let c = document.getElementById("content");

  if (page === "home") {
    c.innerHTML = `
      <div class="card">
        <h2>🏠 Welcome</h2>
        Logged in as: ${userEmail}<br><br>
        Explore Pashtun history, culture, traditions, and identity.
      </div>
    `;
  }

  if (page === "history") {
    c.innerHTML = `
      <div class="card">
        <h2>📜 Pashtun History (Rich Overview)</h2>
        Pashtuns are an ancient Indo-Iranian people with roots in the Hindu Kush region.
        They have resisted many empires including Greeks, Mughals, Mongols, and British.
      </div>

      <div class="card">
        <h3>🏛 Durrani Empire</h3>
        Founded by Ahmad Shah Durrani in 1747, this empire shaped modern Afghanistan.
      </div>

      <div class="card">
        <h3>👑 Famous Figures</h3>
        <p>Ahmad Shah Durrani – Founder of Afghanistan</p>
        <p>Khushal Khan Khattak – Warrior poet</p>
        <p>Rahman Baba – Sufi poet</p>
        <p>Malalai of Maiwand – Symbol of courage</p>
      </div>
    `;
  }

  if (page === "traditions") {
    c.innerHTML = `
      <div class="card">
        <h2>🌿 Traditions (Pashtunwali)</h2>
        <ul>
          <li>Melmastia – Hospitality</li>
          <li>Nang – Honor</li>
          <li>Badal – Justice</li>
          <li>Nanawatai – Forgiveness</li>
          <li>Jirga – Council system</li>
        </ul>
      </div>

      <div class="card">
        Tribal society is based on respect, loyalty, and strong family structure.
      </div>
    `;
  }

  if (page === "culture") {
    c.innerHTML = `
      <div class="card">
        <h2>🎭 Culture</h2>
        Pashto language, poetry, music, and Attan dance define cultural identity.
      </div>

      <div class="card">
        Traditional clothing includes shalwar kameez, pakol, and turbans.
      </div>
    `;
  }
}

</script>

</body>
</html>
