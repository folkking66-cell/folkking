<!DOCTYPE html>
<html>
<head>
  <title>Pashtun Learning Book</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    /* LOGIN */
    .login {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: #1e293b;
      padding: 25px;
      width: 320px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    /* APP LAYOUT */
    .app {
      display: none;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #111827;
      height: 100vh;
      position: fixed;
      padding: 15px;
    }

    .sidebar h3 {
      margin-bottom: 10px;
    }

    .chapter {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .chapter:hover {
      background: #334155;
    }

    .content {
      margin-left: 270px;
      padding: 20px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(10px);}
      to {opacity:1; transform: translateY(0);}
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="box">
    <h2>Login to Book</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Enter Book</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>📚 Pashtun Book</h3>

    <div class="chapter" onclick="openChapter('intro')">📖 Introduction</div>
    <div class="chapter" onclick="openChapter('history')">📜 History</div>
    <div class="chapter" onclick="openChapter('empire')">🏛 Durrani Empire</div>
    <div class="chapter" onclick="openChapter('tribes')">🧬 Tribes</div>
    <div class="chapter" onclick="openChapter('traditions')">🌍 Traditions</div>
    <div class="chapter" onclick="openChapter('pashtunwali')">⚖ Pashtunwali Code</div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="contentBox">
    <div class="card">
      Welcome to the Pashtun Learning Book. Select a chapter.
    </div>
  </div>

</div>

<script>

function login() {
  let email = document.getElementById("email").value;

  localStorage.setItem("user", email);

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "block";
}

/* CHAPTER SYSTEM */
function openChapter(ch) {

  let text = "";

  if (ch === "intro") {
    text = `
    <div class="card">
      <h2>📖 Introduction</h2>
      <p>
        This learning book explores the history, culture, and traditions of the Pashtun people.
        Pashtuns are one of the largest ethnic groups in South and Central Asia with a rich heritage.
      </p>
    </div>`;
  }

  if (ch === "history") {
    text = `
    <div class="card">
      <h2>📜 History</h2>
      <p>
        Pashtuns originate from ancient Indo-Iranian tribes.
        They have lived in the mountainous regions of Afghanistan and Pakistan for thousands of years.
      </p>
      <p>
        They resisted major empires like the Greeks, Mughals, Mongols, and British.
      </p>
    </div>`;
  }

  if (ch === "empire") {
    text = `
    <div class="card">
      <h2>🏛 Durrani Empire</h2>
      <p>
        In 1747, Ahmad Shah Durrani founded the Durrani Empire,
        which became the foundation of modern Afghanistan.
      </p>
    </div>`;
  }

  if (ch === "tribes") {
    text = `
    <div class="card">
      <h2>🧬 Tribes</h2>
      <p>
        Major Pashtun tribes include Afridi, Yousafzai, Durrani, Khattak, and Ghilzai.
        Each tribe has its own traditions and identity.
      </p>
    </div>`;
  }

  if (ch === "traditions") {
    text = `
    <div class="card">
      <h2>🌍 Traditions</h2>
      <p>
        Pashtun culture is based on hospitality, honor, and respect for guests.
        Traditions are passed orally through generations.
      </p>
    </div>`;
  }

  if (ch === "pashtunwali") {
    text = `
    <div class="card">
      <h2>⚖ Pashtunwali Code</h2>
      <ul>
        <li>Melmastia (Hospitality)</li>
        <li>Nang (Honor)</li>
        <li>Badal (Justice)</li>
        <li>Nanawatai (Forgiveness)</li>
        <li>Jirga (Council system)</li>
      </ul>
    </div>`;
  }

  document.getElementById("contentBox").innerHTML = text;
}

</script>

</body>
</html>
