<!DOCTYPE html>
<html>
<head>
  <title>History of Pashtuns</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      overflow: hidden;
    }

    /* BACKGROUND */
    .scene {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: linear-gradient(to top, #0f172a, #1e293b);
    }

    .fog {
      position: absolute;
      width: 200%;
      height: 100%;
      background: rgba(255,255,255,0.04);
      filter: blur(25px);
      animation: move 12s linear infinite;
    }

    @keyframes move {
      from {transform: translateX(-50%);}
      to {transform: translateX(0%);}
    }

    /* INTRO */
    .intro {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.7);
      z-index: 10;
      font-size: 22px;
      text-align: center;
    }

    /* LOGIN */
    .login {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      position: absolute;
      width: 100%;
      z-index: 20;
    }

    .box {
      background: #1e293b;
      padding: 25px;
      width: 320px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    /* APP */
    .app {
      display: none;
      height: 100vh;
    }

    .sidebar {
      width: 240px;
      height: 100vh;
      background: #0b1220;
      position: fixed;
      padding: 15px;
    }

    .chapter {
      padding: 10px;
      margin: 6px 0;
      background: #1e293b;
      border-radius: 6px;
      cursor: pointer;
    }

    .content {
      margin-left: 260px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="scene">
  <div class="fog"></div>
</div>

<!-- INTRO -->
<div class="intro" id="intro">
  📜 Entering the History of Pashtuns...
</div>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="box">
    <h2>📜 Log into the History of Pashtuns</h2>
    <input id="email" placeholder="Enter Email">
    <input id="password" type="password" placeholder="Enter Password">
    <button onclick="enterApp()">Enter History</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="sidebar">
    <h3>📚 Chapters</h3>

    <div class="chapter" onclick="openChapter('intro')">Introduction</div>
    <div class="chapter" onclick="openChapter('history')">History</div>
    <div class="chapter" onclick="openChapter('empire')">Empire</div>
    <div class="chapter" onclick="openChapter('traditions')">Traditions</div>
  </div>

  <div class="content" id="contentBox">
    <div class="card">Select a chapter</div>
  </div>

</div>

<script>

/* FIXED FLOW */
window.onload = function() {
  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("loginPage").style.display = "flex";
  }, 2500);
};

function enterApp() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "block";
}

/* CHAPTERS */
function openChapter(ch) {
  let text = "";

  if (ch === "intro") {
    text = "<div class='card'>Pashtuns are one of the oldest ethnic groups in South and Central Asia.</div>";
  }

  if (ch === "history") {
    text = "<div class='card'>They have ancient Indo-Iranian origins and resisted many empires.</div>";
  }

  if (ch === "empire") {
    text = "<div class='card'>Durrani Empire (1747) shaped modern Afghanistan.</div>";
  }

  if (ch === "traditions") {
    text = "<div class='card'>Pashtunwali code: honor, hospitality, justice, jirga system.</div>";
  }

  document.getElementById("contentBox").innerHTML = text;
}

</script>

</body>
</html>
