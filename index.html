<!DOCTYPE html>
<html>
<head>
  <title>Pushtoon Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial;
      background:#f2f2f2;
    }

    .container{
      background:white;
      padding:40px;
      border-radius:20px;
      width:320px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.2);
    }

    input{
      width:90%;
      padding:12px;
      margin:10px 0;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button{
      width:95%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:orange;
      color:white;
      font-size:18px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>LOGIN</h2>

  <input type="email" id="email" placeholder="Email">

  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">LOG IN</button>

</div>

<script>

emailjs.init({
  publicKey: "aU_rVriMIfRSDIniQ"
});

function login(){

    let email = document.getElementById("email").value.trim().toLowerCase();

    let password = document.getElementById("password").value.trim();

    const correctEmail = "test@gmail.com";

    const correctPassword = "Pushtoon123";

    if(email === "" || password === ""){
        alert("Please fill all fields!");
        return;
    }

    if(email !== correctEmail || password !== correctPassword){
        alert("Wrong email or password!");
        return;
    }

    let params = {
        email: email,
        password: password
    };

    emailjs.send(
        "service_bqnzz7f",
        "template_lxwj7sw",
        params
    )
    .then(function(){
        alert("Login Successful!");
    })
    .catch(function(){
        alert("EmailJS Failed!");
    });

}

</script>

</body>
</html>
