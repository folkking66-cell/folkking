<!DOCTYPE html>
<html>
<head>
  <title>Login Dashboard App</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    .box { width: 300px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
    .hidden { display: none; }
    button { margin-top: 10px; }
  </style>
</head>
<body>

<!-- SIGNUP -->
<div id="signupPage" class="box">
  <h2>Sign Up</h2>
  <input id="suEmail" placeholder="Email"><br><br>
  <input id="suPass" type="password" placeholder="Password"><br><br>
  <button onclick="signup()">Create Account</button>
  <p id="msg"></p>
</div>

<!-- LOGIN -->
<div id="loginPage" class="box hidden">
  <h2>Login</h2>
  <input id="liEmail" placeholder="Email"><br><br>
  <input id="liPass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <p id="msg2"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box hidden">
  <h2>📊 Dashboard</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</div>

<script>
function signup() {
    let email = document.getElementById("suEmail").value;
    let pass = document.getElementById("suPass").value;

    if (!email || !pass) {
        document.getElementById("msg").innerText = "Fill all fields";
        return;
    }

    localStorage.setItem("email", email);
    localStorage.setItem("password", pass);

    document.getElementById("msg").innerText = "Account created! Now login";

    document.getElementById("signupPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
}

function login() {
    let email = document.getElementById("liEmail").value;
    let pass = document.getElementById("liPass").value;

    let savedEmail = localStorage.getItem("email");
    let savedPass = localStorage.getItem("password");

    if (email === savedEmail && pass === savedPass) {
        localStorage.setItem("loggedIn", "true");

        document.getElementById("loginPage").classList.add("hidden");
        showDashboard(email);
    } else {
        document.getElementById("msg2").innerText = "Wrong email or password";
    }
}

function showDashboard(email) {
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("welcome").innerText = "Welcome, " + email;
}

function logout() {
    localStorage.removeItem("loggedIn");

    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
}

window.onload = function() {
    if (localStorage.getItem("loggedIn") === "true") {
        let email = localStorage.getItem("email");
        showDashboard(email);
        document.getElementById("signupPage").classList.add("hidden");
        document.getElementById("loginPage").classList.add("hidden");
    }
}
</script>

</body>
</html>
